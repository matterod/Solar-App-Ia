services:
  database:
    image: postgres:16-alpine
    container_name: solar-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: solar_erp
      POSTGRES_USER: solar_admin
      POSTGRES_PASSWORD: solar_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar_admin -d solar_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-node
      dockerfile: ../docker/backend-node.Dockerfile
    container_name: solar-erp-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://solar_admin:solar_secret_2024@database:5432/solar_erp
      SECRET_KEY: super-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3000"]'
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend-node:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: solar-erp-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  # Agent container — standby service for CLI testing and future webhooks.
  # Claude integration runs inside the backend (routers/agent.py).
  # To test the CLI agent: docker compose run --rm agent python -m sol.main
  agent:
    build:
      context: ./agent
      dockerfile: ../docker/agent.Dockerfile
    container_name: solar-erp-agent
    restart: "no"
    environment:
      BACKEND_URL: http://backend:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - backend
    volumes:
      - ./agent:/app
    profiles:
      - cli

volumes:
  postgres_data:
